<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Management | Vaddepalli Kanishq</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Script inline to prevent Dark Mode flicker -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('portfolio-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark'));
            }
        })();
    </script>
</head>
<body>
    <nav>
        <div class="brand">
            <div class="brand-icon">VK</div>
            <h2><a href="index.html">Vaddepalli Kanishq</a></h2>
        </div>
        <ul id="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="skills.html" class="active">Skills</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
                <!-- Sun Icon -->
                <svg class="sun-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <!-- Moon Icon -->
                <svg class="moon-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
            <button class="nav-toggle-btn" id="nav-toggle-btn" aria-label="Toggle Navigation">☰</button>
        </div>
    </nav>

    <section>
        <div class="section-header">
            <span class="eyebrow">Inventory Console</span>
            <h2>Manage Skills</h2>
        </div>

        <div class="card admin-form">
            <h3>Add New Skill</h3>
            <form id="skill-form">
                <input type="text" id="skill-name" placeholder="E.g., Vue.js, Node.js, Docker..." required>
                <button type="submit" class="btn">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                    Register Skill
                </button>
            </form>
        </div>

        <div id="skill-list" class="skill-grid">
            <!-- Dynamic skills list rendered from localstorage -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Vaddepalli Kanishq. Designed for high performance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
